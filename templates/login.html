<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>เข้าสู่ระบบ</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center">
  <div class="bg-white shadow-lg rounded-2xl p-8 w-full max-w-sm">
    <h2 class="text-2xl font-bold text-indigo-700 mb-6 text-center">เข้าสู่ระบบ</h2>
    {% if error %}
    <div class="bg-red-50 text-red-600 text-sm rounded-lg px-4 py-2 mb-4">{{ error }}</div>
    {% endif %}
    <form method="post" action="/auth/login" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อผู้ใช้</label>
        <input name="username" type="text" required
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">รหัสผ่าน</label>
        <input name="password" type="password" required
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition">
        เข้าสู่ระบบ
      </button>
    </form>
    <p class="text-sm text-center text-slate-500 mt-4">
      ยังไม่มีบัญชี? <a href="/register" class="text-indigo-600 hover:underline">สมัครสมาชิก</a>
    </p>
  </div>
</body>
</html>
