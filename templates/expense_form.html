{% extends "base.html" %}
{% block content %}
<div class="max-w-lg">
  <h2 class="text-2xl font-bold text-slate-800 mb-6">
    {% if expense %}แก้ไขรายการ{% else %}เพิ่มรายการใหม่{% endif %}
  </h2>
  <div class="bg-white rounded-2xl shadow p-6">
    <form method="post" action="{% if expense %}/expenses/{{ expense.id }}{% else %}/expenses{% endif %}" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">ชื่อรายการ <span class="text-red-500">*</span></label>
        <input name="title" type="text" required value="{{ expense.title if expense else '' }}"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">จำนวนเงิน (บาท) <span class="text-red-500">*</span></label>
        <input name="amount" type="number" step="0.01" min="0" required value="{{ expense.amount if expense else '' }}"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">ประเภท</label>
        <select name="type"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">
          <option value="expense" {% if not expense or expense.type == "expense" %}selected{% endif %}>รายจ่าย</option>
          <option value="income" {% if expense and expense.type == "income" %}selected{% endif %}>รายรับ</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">หมวดหมู่</label>
        <input name="category" type="text" value="{{ expense.category if expense else '' }}"
          placeholder="เช่น อาหาร, เดินทาง, เงินเดือน"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">วันที่ <span class="text-red-500">*</span></label>
        <input name="date" type="date" required value="{{ expense.date if expense else '' }}"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">หมายเหตุ</label>
        <textarea name="note" rows="2"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-400">{{ expense.note if expense else '' }}</textarea>
      </div>
      <div class="flex gap-3 pt-2">
        <button type="submit"
          class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold px-5 py-2 rounded-lg transition">
          บันทึก
        </button>
        <a href="/" class="text-slate-500 hover:text-slate-700 px-4 py-2 text-sm">ยกเลิก</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
